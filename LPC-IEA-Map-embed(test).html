document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nd information needs of Washington, DC.\",\"note\":\"\"},{\"city\":\"Whitesburg\",\"state\":\"Kentucky\",\"lead\":\"WMMT\",\"lat\":37.1187,\"lng\":-82.8268,\"link\":\"https://drive.google.com/file/d/1MoCeKVLMF4JEarhDUrZJqtUIsBUnq1kE/view\",\"overview\":\"An Information Ecosystem Assessment produced with WMMT, mapping the local news and information needs of Whitesburg, Kentucky.\",\"note\":\"\"}]<\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Chivo',-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;background:#f7f5f1;color:#16140f;overflow:hidden;\">\n\n  <header style=\"display:flex;align-items:center;justify-content:space-between;background:#111110;color:#fff;padding:0 26px;height:62px;flex:none;\">\n    <div style=\"display:flex;align-items:center;gap:13px;\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 40 40\" fill=\"none\" aria-hidden=\"true\"><circle cx=\"20\" cy=\"20\" r=\"18.5\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle><circle cx=\"12.5\" cy=\"20\" r=\"2.4\" fill=\"#fb5631\"><\u002Fcircle><circle cx=\"20\" cy=\"20\" r=\"2.4\" fill=\"#fff\"><\u002Fcircle><circle cx=\"27.5\" cy=\"20\" r=\"2.4\" fill=\"#3ea2ef\"><\u002Fcircle><\u002Fsvg>\n      <div style=\"line-height:1.04;\">\n        <div style=\"font-weight:900;font-size:16px;letter-spacing:-.01em;\">Listening Post Collective<\u002Fdiv>\n        <div style=\"font-weight:400;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9b988f;\">Powered by Internews<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;\">\n      <span style=\"display:inline-block;width:9px;height:9px;border-radius:50%;background:#fb5631;\"><\u002Fspan>\n      <span style=\"display:inline-block;width:9px;height:9px;border-radius:50%;background:#ba6aa7;\"><\u002Fspan>\n      <span style=\"display:inline-block;width:9px;height:9px;border-radius:50%;background:#3ea2ef;\"><\u002Fspan>\n      <span style=\"display:inline-block;width:9px;height:9px;border-radius:50%;background:#cbff00;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding:20px 28px 16px;flex:none;border-bottom:1px solid #e6e2d9;flex-wrap:wrap;\">\n    <div>\n      <div style=\"font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#fb5631;margin-bottom:7px;\">Where we've listened<\u002Fdiv>\n      <h1 style=\"margin:0;font-weight:900;font-size:30px;letter-spacing:-.02em;line-height:1;\">Information Ecosystem Assessments<\u002Fh1>\n    <\u002Fdiv>\n    <p style=\"margin:0;max-width:430px;font-size:13.5px;line-height:1.5;color:#615e56;text-wrap:pretty;\">\n      A growing map of the communities where the Listening Post Collective and local partners have studied how people find, trust, and share news. Click any marker to read the full assessment.\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;display:flex;min-height:0;\">\n\n    <sc-if value=\"{{ showDirectory }}\" hint-placeholder-val=\"{{ true }}\">\n    <aside style=\"width:318px;flex:none;border-right:1px solid #e6e2d9;display:flex;flex-direction:column;min-height:0;background:#faf8f4;\">\n      <div style=\"padding:16px 16px 12px;flex:none;border-bottom:1px solid #ece8df;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px;\">\n          <span style=\"font-weight:900;font-size:15px;\">Communities<\u002Fspan>\n          <span style=\"font-weight:700;font-size:12px;color:#fff;background:#fb5631;border-radius:20px;padding:3px 10px;\">{{ count }}<\u002Fspan>\n        <\u002Fdiv>\n        <input value=\"{{ query }}\" oninput=\"{{ onQuery }}\" placeholder=\"Search community, state, partner\" style=\"width:100%;border:1px solid #ddd8cd;background:#fff;border-radius:7px;padding:9px 11px;font-family:inherit;font-size:13px;color:#16140f;outline:none;\">\n      <\u002Fdiv>\n      <div style=\"overflow-y:auto;flex:1;padding:6px;\">\n        <sc-for list=\"{{ list }}\" as=\"item\" hint-placeholder-count=\"9\">\n          <button onclick=\"{{ item.onClick }}\" style=\"width:100%;text-align:left;border:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:8px;font-family:inherit;background:{{ item.bg }};border-left:3px solid {{ item.bar }};margin-bottom:2px;\">\n            <span style=\"width:9px;height:9px;border-radius:50%;flex:none;background:{{ item.dot }};box-shadow:0 0 0 3px {{ item.dotHalo }};\"><\u002Fspan>\n            <span style=\"min-width:0;flex:1;\">\n              <span style=\"display:block;font-weight:700;font-size:13.5px;color:#16140f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ item.city }}<\u002Fspan>\n              <span style=\"display:block;font-size:11.5px;color:#86827a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ item.state }} · {{ item.lead }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Faside>\n    <\u002Fsc-if>\n\n    <main style=\"flex:1;position:relative;min-width:0;background:#f7f5f1;\">\n      <div ref=\"{{ mapRef }}\" style=\"position:absolute;inset:0;\"><\u002Fdiv>\n\n      <sc-if value=\"{{ hasSelected }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;left:{{ popupLeft }};top:{{ popupTop }};width:316px;background:#fff;border-radius:9px;border-top:4px solid {{ accent }};box-shadow:0 14px 40px -8px rgba(20,16,8,.30),0 0 0 1px rgba(20,16,8,.05);overflow:hidden;animation:iea-pop .18s ease both;z-index:20;\">\n        <div style=\"padding:17px 18px 16px;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;\">\n            <div>\n              <div style=\"font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:{{ accent }};margin-bottom:4px;\">{{ selected.state }}<\u002Fdiv>\n              <h3 style=\"margin:0;font-weight:900;font-size:21px;line-height:1.05;letter-spacing:-.01em;\">{{ selected.city }}<\u002Fh3>\n            <\u002Fdiv>\n            <button onclick=\"{{ onClose }}\" aria-label=\"Close\" style=\"flex:none;border:none;background:#f2efe8;color:#615e56;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;background:#f4f1ea;border-radius:20px;padding:4px 11px;\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ accent }};\"><\u002Fspan>\n              <span style=\"font-size:12px;font-weight:700;color:#3f3c35;\">Led by {{ selected.leadLabel }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ selected.funded }}\" hint-placeholder-val=\"\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:10px;background:rgba(251,86,49,.09);border:1px solid rgba(251,86,49,.22);border-radius:8px;padding:8px 11px;\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 40 40\" fill=\"none\" style=\"flex:none;\"><circle cx=\"20\" cy=\"20\" r=\"18\" stroke=\"{{ lpcColor }}\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"12.5\" cy=\"20\" r=\"2.6\" fill=\"{{ lpcColor }}\"><\u002Fcircle><circle cx=\"20\" cy=\"20\" r=\"2.6\" fill=\"{{ lpcColor }}\"><\u002Fcircle><circle cx=\"27.5\" cy=\"20\" r=\"2.6\" fill=\"{{ lpcColor }}\"><\u002Fcircle><\u002Fsvg>\n              <span style=\"font-size:11.5px;font-weight:700;color:#a23a1f;line-height:1.3;\">Funded &amp; coached by the Listening Post Collective<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <p style=\"margin:13px 0 0;font-size:13px;line-height:1.55;color:#54514a;text-wrap:pretty;\">{{ selected.overview }}<\u002Fp>\n          <sc-if value=\"{{ selected.note }}\" hint-placeholder-val=\"\">\n            <p style=\"margin:9px 0 0;font-size:11.5px;font-style:italic;color:#9a968d;\">Note: {{ selected.note }}<\u002Fp>\n          <\u002Fsc-if>\n          <a href=\"{{ selected.link }}\" target=\"_blank\" rel=\"noopener\" style=\"margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:#111110;color:#fff;font-weight:700;font-size:13.5px;border-radius:8px;padding:12px 14px;\" style-hover=\"background:#fb5631;\">\n            Read the full assessment\n            <span style=\"font-size:15px;\">→<\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"position:absolute;left:18px;bottom:16px;display:flex;flex-direction:column;gap:7px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border:1px solid #e6e2d9;border-radius:11px;padding:11px 14px;font-size:12px;color:#4f4c45;z-index:10;white-space:nowrap;\">\n        <div style=\"font-weight:900;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#9a968d;\">Who led the assessment<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;flex:none;background:{{ lpcColor }};\"><\u002Fspan>\n          <span><b style=\"color:#16140f;\">Listening Post Collective<\u002Fb> · {{ lpcCount }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;flex:none;background:{{ partnerColor }};\"><\u002Fspan>\n          <span><b style=\"color:#16140f;\">Local outlet partner<\u002Fb> · {{ partnerCount }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#fb5631&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;partnerColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#3ea2ef&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;landColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#e4e0d7&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;markerSize&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 6, &quot;min&quot;: 4, &quot;max&quot;: 12, &quot;tsType&quot;: &quot;number&quot;},\n  &quot;showDirectory&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { locations: [], selected: null, query: '', popupLeft: '0px', popupTop: '0px' };\n  mapRef = React.createRef();\n\n  componentDidMount() {\n    this.byIndex = {};\n    const boot = (list) => {\n      list.forEach((d, i) => { d._i = i; this.byIndex[i] = d; });\n      this.locs = list;\n      this.setState({ locations: list });\n      this.ensureLibsThenDraw();\n    };\n    let inline = null;\n    const tag = document.getElementById('iea-data');\n    if (tag) { try { inline = JSON.parse(tag.textContent); } catch (e) {} }\n    if (inline && inline.length) { boot(inline); }\n    else { fetch('locations.json').then(r => r.json()).then(boot); }\n    this._onResize = () => { clearTimeout(this._rt); this._rt = setTimeout(() => { this.draw(); this.updatePopup(); }, 150); };\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }\n\n  componentDidUpdate(prev) {\n    const a = prev, b = this.props;\n    if (a.accentColor !== b.accentColor || a.landColor !== b.landColor || a.markerSize !== b.markerSize || a.showDirectory !== b.showDirectory) {\n      requestAnimationFrame(() => { this.draw(); this.updatePopup(); });\n    }\n  }\n\n  mk() { return this.props.markerSize ?? 6; }\n  accent() { return this.props.accentColor ?? '#fb5631'; }\n  lpcColor() { return this.props.accentColor ?? '#fb5631'; }\n  partnerColor() { return this.props.partnerColor ?? '#3ea2ef'; }\n  isLPC(d) { return d.lead === 'LPC' || d.lead === ''; }\n  colorFor(d) { return this.isLPC(d) ? this.lpcColor() : this.partnerColor(); }\n  hexToHalo(hex) {\n    const h = (hex || '').replace('#', '');\n    if (h.length !== 6) return 'rgba(251,86,49,.20)';\n    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);\n    return 'rgba(' + r + ',' + g + ',' + b + ',.20)';\n  }\n\n  ensureLibsThenDraw() {\n    const ok = window.d3 && window.topojson && window.d3.geoAlbersUsaTerritories;\n    if (!ok) { setTimeout(() => this.ensureLibsThenDraw(), 100); return; }\n    if (!this.states) {\n      fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(r => r.json()).then(topo => {\n        this.states = window.topojson.feature(topo, topo.objects.states);\n        this.draw();\n      });\n    } else { this.draw(); }\n  }\n\n  draw() {\n    const el = this.mapRef.current;\n    if (!el || !window.d3 || !this.states || !this.locs) return;\n    const d3 = window.d3;\n    const width = el.clientWidth, height = el.clientHeight;\n    if (!width || !height) return;\n    el.innerHTML = '';\n    const svg = d3.select(el).append('svg').attr('width', width).attr('height', height).style('display', 'block');\n    const proj = d3.geoAlbersUsaTerritories().fitSize([width * 0.97, height * 0.94], this.states);\n    const t = proj.translate();\n    proj.translate([width / 2, height / 2 + 4]);\n    this.projection = proj;\n    const path = d3.geoPath(proj);\n    const land = this.props.landColor ?? '#e4e0d7';\n    svg.append('g').selectAll('path').data(this.states.features).join('path')\n      .attr('d', path).attr('fill', land).attr('stroke', '#f7f5f1').attr('stroke-width', 1.1)\n      .attr('vector-effect', 'non-scaling-stroke');\n    const g = svg.append('g');\n    const self = this;\n    this.markerSel = g.selectAll('circle').data(this.locs).join('circle')\n      .attr('cx', d => { const p = proj([d.lng, d.lat]); d._p = p; return p ? p[0] : -9999; })\n      .attr('cy', d => { const p = proj([d.lng, d.lat]); return p ? p[1] : -9999; })\n      .attr('cursor', 'pointer')\n      .attr('stroke', '#fff').attr('stroke-width', 1.5)\n      .style('transition', 'r .12s ease')\n      .on('mouseenter', function (e, d) { if (self.state.selected !== d._i) d3.select(this).attr('r', self.mk() + 2.5); })\n      .on('mouseleave', function (e, d) { if (self.state.selected !== d._i) d3.select(this).attr('r', self.mk()); })\n      .on('click', (e, d) => self.selectLoc(d._i));\n    this.markerSel.append('title').text(d => d.city + ', ' + d.state);\n    this.refreshMarkers();\n  }\n\n  refreshMarkers() {\n    const sel = this.state.selected, mk = this.mk();\n    if (!this.markerSel) return;\n    this.markerSel\n      .attr('r', d => d._i === sel ? mk + 3.5 : mk)\n      .attr('fill', d => d._i === sel ? '#111110' : this.colorFor(d))\n      .attr('stroke', d => d._i === sel ? this.colorFor(d) : '#fff')\n      .attr('stroke-width', d => d._i === sel ? 3.5 : 1.5);\n  }\n\n  updatePopup() {\n    const i = this.state.selected;\n    if (i == null || !this.projection) return;\n    const loc = this.byIndex[i];\n    const p = this.projection([loc.lng, loc.lat]);\n    const el = this.mapRef.current;\n    if (!p || !el) return;\n    const w = el.clientWidth, h = el.clientHeight, cw = 316, ch = 280;\n    let left = p[0] + 16;\n    if (left + cw > w - 12) left = p[0] - cw - 16;\n    left = Math.max(12, Math.min(w - cw - 12, left));\n    let top = p[1] - 70;\n    top = Math.max(12, Math.min(h - ch - 12, top));\n    this.setState({ popupLeft: left + 'px', popupTop: top + 'px' });\n  }\n\n  selectLoc(i) {\n    this.setState({ selected: i }, () => { this.refreshMarkers(); this.updatePopup(); });\n  }\n\n  close() { this.setState({ selected: null }, () => this.refreshMarkers()); }\n\n  filtered() {\n    const q = (this.state.query || '').toLowerCase().trim();\n    let arr = this.state.locations || [];\n    if (q) arr = arr.filter(d => (d.city + ' ' + d.state + ' ' + d.lead).toLowerCase().includes(q));\n    const sel = this.state.selected;\n    return arr.map(d => {\n      const c = this.colorFor(d);\n      return {\n        ...d,\n        active: d._i === sel,\n        bg: d._i === sel ? '#fff' : 'transparent',\n        bar: d._i === sel ? c : 'transparent',\n        dot: c,\n        dotHalo: d._i === sel ? this.hexToHalo(c) : 'transparent',\n        onClick: () => this.selectLoc(d._i)\n      };\n    });\n  }\n\n  renderVals() {\n    const sel = this.state.selected;\n    const locs = this.state.locations || [];\n    const lpcCount = locs.filter(d => this.isLPC(d)).length;\n    const selObj = sel != null ? this.byIndex[sel] : null;\n    const selected = selObj ? {\n      ...selObj,\n      leadLabel: this.isLPC(selObj) ? 'the Listening Post Collective' : selObj.lead,\n      funded: !this.isLPC(selObj)\n    } : {};\n    return {\n      mapRef: this.mapRef,\n      list: this.filtered(),\n      count: locs.length,\n      lpcCount: lpcCount,\n      partnerCount: locs.length - lpcCount,\n      lpcColor: this.lpcColor(),\n      partnerColor: this.partnerColor(),\n      selected: selected,\n      hasSelected: sel != null,\n      accent: selObj ? this.colorFor(selObj) : this.lpcColor(),\n      popupLeft: this.state.popupLeft,\n      popupTop: this.state.popupTop,\n      showDirectory: this.props.showDirectory ?? true,\n      query: this.state.query,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      onClose: () => this.close()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
