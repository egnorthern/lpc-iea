    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');

            const reader = ds.readable.getReader();

            writer.close();

            'e.preventDefault();' +

              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +

            'else scrollTo({top:0, behavior:"smooth"});' +

    }

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

            s.textContent = await r.text();

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

      }

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);

  } catch (err) {
    setStatus('Error unpacking: ' + err.message);

\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 0 3-6.7\"><\u002Fpath><path d=\"M3 4v4h4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;top:14px;right:14px;z-index:12;background:rgba(255,255,255,.94);backdrop-filter:blur(4px);border:1px solid #e6e2d9;border-radius:11px;padding:11px 13px;width:236px;\">\n        <div style=\"font-weight:900;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#9a968d;margin-bottom:7px;\">Civic Information Index<\u002Fdiv>\n        <div style=\"position:relative;\">\n          <select value=\"{{ metricVal }}\" onchange=\"{{ onMetric }}\" style=\"appearance:none;width:100%;border:1px solid #ddd8cd;background:#fff;border-radius:7px;padding:8px 28px 8px 10px;font-family:inherit;font-size:12.5px;font-weight:700;color:#16140f;cursor:pointer;outline:none;\">\n            <option value=\"-1\">Off — show base map<\u002Foption>\n            <option value=\"0\">Overall Index<\u002Foption>\n            <option value=\"1\">News &amp; Information<\u002Foption>\n            <option value=\"2\">Civic Participation<\u002Foption>\n            <option value=\"3\">Equity &amp; Justice<\u002Foption>\n            <option value=\"4\">Health &amp; Opportunity<\u002Foption>\n            <option value=\"5\">Environmental Resilience<\u002Foption>\n          <\u002Fselect>\n          <span style=\"position:absolute;right:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:#9a968d;font-size:10px;\">▼<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ shadingOn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:11px;\">\n            <div style=\"height:9px;border-radius:5px;background:{{ legendGradient }};\"><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;margin-top:4px;font-size:10.5px;font-weight:700;color:#86827a;\">\n              <span>Lower<\u002Fspan><span>Higher<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:7px;font-size:10.5px;line-height:1.4;color:#9a968d;\"><b style=\"color:#615e56;\">{{ metricName }}<\u002Fb> · county percentile (0–100). Source: civicinfoindex.org<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasSelected }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;left:{{ popupLeft }};top:{{ popupTop }};width:316px;background:#fff;border-radius:9px;border-top:4px solid {{ accent }};box-shadow:0 14px 40px -8px rgba(20,16,8,.30),0 0 0 1px rgba(20,16,8,.05);overflow:hidden;animation:iea-pop .18s ease both;z-index:20;\">\n        <div style=\"padding:17px 18px 16px;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;\">\n            <div>\n              <div style=\"font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:{{ accent }};margin-bottom:4px;\">{{ selected.state }}<\u002Fdiv>\n              <h3 style=\"margin:0;font-weight:900;font-size:21px;line-height:1.05;letter-spacing:-.01em;\">{{ selected.city }}<\u002Fh3>\n            <\u002Fdiv>\n            <button onclick=\"{{ onClose }}\" aria-label=\"Close\" style=\"flex:none;border:none;background:#f2efe8;color:#615e56;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;background:#f4f1ea;border-radius:20px;padding:4px 11px;\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ accent }};\"><\u002Fspan>\n              <span style=\"font-size:12px;font-weight:700;color:#3f3c35;\">Led by {{ selected.leadLabel }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ selected.funded }}\" hint-placeholder-val=\"\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:10px;background:rgba(251,86,49,.09);border:1px solid rgba(251,86,49,.22);border-radius:8px;padding:8px 11px;\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 40 40\" fill=\"none\" style=\"flex:none;\"><circle cx=\"20\" cy=\"20\" r=\"18\" stroke=\"{{ lpcColor }}\" stroke-width=\"3\"><\u002Fcircle><circle cx=\"12.5\" cy=\"20\" r=\"2.6\" fill=\"{{ lpcColor }}\"><\u002Fcircle><circle cx=\"20\" cy=\"20\" r=\"2.6\" fill=\"{{ lpcColor }}\"><\u002Fcircle><circle cx=\"27.5\" cy=\"20\" r=\"2.6\" fill=\"{{ lpcColor }}\"><\u002Fcircle><\u002Fsvg>\n              <span style=\"font-size:11.5px;font-weight:700;color:#a23a1f;line-height:1.3;\">Funded &amp; coached by the Listening Post Collective<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <p style=\"margin:13px 0 0;font-size:13px;line-height:1.55;color:#54514a;text-wrap:pretty;\">{{ selected.overview }}<\u002Fp>\n          <sc-if value=\"{{ selected.note }}\" hint-placeholder-val=\"\">\n            <p style=\"margin:9px 0 0;font-size:11.5px;font-style:italic;color:#9a968d;\">Note: {{ selected.note }}<\u002Fp>\n          <\u002Fsc-if>\n          <a href=\"{{ selected.link }}\" target=\"_blank\" rel=\"noopener\" style=\"margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:#111110;color:#fff;font-weight:700;font-size:13.5px;border-radius:8px;padding:12px 14px;\" style-hover=\"background:#fb5631;\">\n            Read the full assessment\n            <span style=\"font-size:15px;\">→<\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"position:absolute;left:18px;bottom:16px;display:flex;flex-direction:column;gap:7px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border:1px solid #e6e2d9;border-radius:11px;padding:11px 14px;font-size:12px;color:#4f4c45;z-index:10;white-space:nowrap;\">\n        <div style=\"font-weight:900;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#9a968d;\">Who led the assessment<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;flex:none;background:{{ lpcColor }};\"><\u002Fspan>\n          <span><b style=\"color:#16140f;\">Listening Post Collective<\u002Fb> · {{ lpcCount }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;flex:none;background:{{ partnerColor }};\"><\u002Fspan>\n          <span><b style=\"color:#16140f;\">Local outlet partner<\u002Fb> · {{ partnerCount }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#fb5631&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;partnerColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#3ea2ef&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;landColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#e4e0d7&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;markerSize&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 6, &quot;min&quot;: 4, &quot;max&quot;: 12, &quot;tsType&quot;: &quot;number&quot;},\n  &quot;showDirectory&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { locations: [], selected: null, query: '', popupLeft: '0px', popupTop: '0px', metric: -1 };\n  mapRef = React.createRef();\n  METRICS = ['Overall Index', 'News & Information', 'Civic Participation', 'Equity & Justice', 'Health & Opportunity', 'Environmental Resilience'];\n  // One sequential ramp per metric, anchored on an official Civic Information Index brand color.\n  RAMPS = {\n    '-1': ['#efdbec', '#c782bd', '#af4da0', '#73396a'],\n    0: ['#eaecee', '#bfc6cd', '#8794a1', '#546679', '#294057'],   // Overall — CII navy\n    1: ['#ebf4fc', '#c1dbf6', '#8cbdef', '#5ba0e8', '#4572a2'],   // News & Information — CII blue\n    2: ['#fdeee2', '#f8c8a3', '#f29a56', '#ed6e0e', '#a55112'],   // Civic Participation — CII orange\n    3: ['#f5eaf4', '#e1bbdb', '#c782bd', '#af4da0', '#7c3c72'],   // Equity & Justice — CII magenta\n    4: ['#fff7e2', '#ffe7a2', '#ffd254', '#ffbf0a', '#b1870f'],   // Health & Opportunity — CII amber\n    5: ['#fafcec', '#eff6c1', '#e1ef8e', '#d4e85d', '#95a246']    // Environmental Resilience — CII lime\n  };\n\n  componentDidMount() {\n    this.byIndex = {};\n    this.civic = {};\n    const boot = (list) => {\n      list.forEach((d, i) => { d._i = i; this.byIndex[i] = d; });\n      this.locs = list;\n      this.setState({ locations: list });\n      this.ensureLibsThenDraw();\n    };\n    let inline = null;\n    const tag = document.getElementById('iea-data');\n    if (tag) { try { inline = JSON.parse(tag.textContent); } catch (e) {} }\n    if (inline && inline.length) { boot(inline); }\n    else { fetch('locations.json').then(r => r.json()).then(boot); }\n    // Civic Information Index data (inline-first, fetch fallback)\n    let cinline = null;\n    const ctag = document.getElementById('civic-data');\n    if (ctag) { try { cinline = JSON.parse(ctag.textContent); } catch (e) {} }\n    if (cinline && Object.keys(cinline).length) { this.civic = cinline; }\n    else { fetch('civic.json').then(r => r.json()).then(o => { this.civic = o; if (this.state.metric >= 0) this.draw(); }).catch(() => {}); }\n    this._onResize = () => { clearTimeout(this._rt); this._rt = setTimeout(() => { this.draw(); this.updatePopup(); }, 150); };\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }\n\n  componentDidUpdate(prev) {\n    const a = prev, b = this.props;\n    if (a.accentColor !== b.accentColor || a.landColor !== b.landColor || a.markerSize !== b.markerSize || a.showDirectory !== b.showDirectory) {\n      requestAnimationFrame(() => { this.draw(); this.updatePopup(); });\n    }\n  }\n\n  mk() { return this.props.markerSize ?? 6; }\n  accent() { return this.props.accentColor ?? '#fb5631'; }\n  lpcColor() { return this.props.accentColor ?? '#fb5631'; }\n  partnerColor() { return this.props.partnerColor ?? '#3ea2ef'; }\n  isLPC(d) { return d.lead === 'LPC' || d.lead === ''; }\n  colorFor(d) { return this.isLPC(d) ? this.lpcColor() : this.partnerColor(); }\n  hexToHalo(hex) {\n    const h = (hex || '').replace('#', '');\n    if (h.length !== 6) return 'rgba(251,86,49,.20)';\n    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);\n    return 'rgba(' + r + ',' + g + ',' + b + ',.20)';\n  }\n\n  ramp(metric) { return this.RAMPS[metric] || this.RAMPS[0]; }\n\n  color(v, metric) {\n    this._scales = this._scales || {};\n    if (!this._scales[metric]) {\n      this._scales[metric] = window.d3.scaleSequential(window.d3.interpolateRgbBasis(this.ramp(metric))).domain([0, 100]);\n    }\n    return this._scales[metric](v);\n  }\n\n  civicReady() { return this.civic && Object.keys(this.civic).length > 0; }\n\n  loadCounties() {\n    if (this._loadingCounties) return;\n    this._loadingCounties = true;\n    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')\n      .then(r => r.json())\n      .then(topo => { this.counties = window.topojson.feature(topo, topo.objects.counties); this.draw(); })\n      .catch(() => { this._loadingCounties = false; });\n  }\n\n  setMetric(m) {\n    this.setState({ metric: m }, () => {\n      if (m >= 0 && !this.counties) this.loadCounties();\n      else this.draw();\n    });\n  }\n\n  ensureLibsThenDraw() {\n    const ok = window.d3 && window.topojson && window.d3.geoAlbersUsaTerritories;\n    if (!ok) { setTimeout(() => this.ensureLibsThenDraw(), 100); return; }\n    if (!this.states) {\n      fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(r => r.json()).then(topo => {\n        this.states = window.topojson.feature(topo, topo.objects.states);\n        this.draw();\n      });\n    } else { this.draw(); }\n  }\n\n  draw() {\n    const el = this.mapRef.current;\n    if (!el || !window.d3 || !this.states || !this.locs) return;\n    const d3 = window.d3;\n    const width = el.clientWidth, height = el.clientHeight;\n    if (!width || !height) return;\n    el.innerHTML = '';\n    const svg = d3.select(el).append('svg').attr('width', width).attr('height', height).style('display', 'block');\n    const proj = d3.geoAlbersUsaTerritories().fitSize([width * 0.97, height * 0.94], this.states);\n    const t = proj.translate();\n    proj.translate([width / 2, height / 2 + 4]);\n    this.projection = proj;\n    const path = d3.geoPath(proj);\n    const land = this.props.landColor ?? '#e4e0d7';\n    const metric = this.state.metric;\n    const shading = metric >= 0 && this.counties && this.civicReady();\n    const gRoot = svg.append('g');\n    this.gRoot = gRoot;\n    const bgG = gRoot.append('g');\n    if (shading) {\n      const counties = bgG.selectAll('path').data(this.counties.features).join('path')\n        .attr('d', path)\n        .attr('fill', d => { const rec = this.civic[d.id]; const v = rec ? rec.v[metric] : null; return (v == null) ? '#ebe8e2' : this.color(v, metric); })\n        .attr('stroke', 'rgba(255,255,255,.45)').attr('stroke-width', 0.3)\n        .attr('vector-effect', 'non-scaling-stroke');\n      counties.append('title').text(d => {\n        const rec = this.civic[d.id]; if (!rec) return '';\n        const v = rec.v[metric];\n        return rec.n + ', ' + rec.s + (v == null ? ' — no data' : ' · ' + this.METRICS[metric] + ': ' + v);\n      });\n      gRoot.append('g').selectAll('path').data(this.states.features).join('path')\n        .attr('d', path).attr('fill', 'none').attr('stroke', '#fff').attr('stroke-width', 1.0)\n        .attr('vector-effect', 'non-scaling-stroke');\n    } else {\n      bgG.selectAll('path').data(this.states.features).join('path')\n        .attr('d', path).attr('fill', land).attr('stroke', '#f7f5f1').attr('stroke-width', 1.1)\n        .attr('vector-effect', 'non-scaling-stroke');\n    }\n    const g = gRoot.append('g');\n    const self = this;\n    this.markerSel = g.selectAll('circle').data(this.locs).join('circle')\n      .attr('cx', d => { const p = proj([d.lng, d.lat]); d._p = p; return p ? p[0] : -9999; })\n      .attr('cy', d => { const p = proj([d.lng, d.lat]); return p ? p[1] : -9999; })\n      .attr('cursor', 'pointer')\n      .attr('stroke', '#fff').attr('stroke-width', 1.5)\n      .style('transition', 'r .12s ease')\n      .on('mouseenter', function (e, d) { if (self.state.selected !== d._i) d3.select(this).attr('r', (self.mk() + 2.5) / (self._k || 1)); })\n      .on('mouseleave', function (e, d) { if (self.state.selected !== d._i) d3.select(this).attr('r', self.mk() / (self._k || 1)); })\n      .on('click', (e, d) => self.selectLoc(d._i));\n    this.markerSel.append('title').text(d => d.city + ', ' + d.state);\n    this.refreshMarkers();\n\n    // Zoom + pan\n    this.svgSel = svg;\n    const mx = width * 0.25, my = height * 0.25;\n    this.zoom = d3.zoom()\n      .scaleExtent([1, 14])\n      .translateExtent([[-mx, -my], [width + mx, height + my]])\n      .on('zoom', (e) => {\n        this.zoomTransform = e.transform;\n        this._k = e.transform.k;\n        gRoot.attr('transform', e.transform);\n        this.refreshMarkers();\n        this.updatePopup();\n      });\n    svg.call(this.zoom).on('dblclick.zoom', null);\n    // re-apply any existing zoom state across redraws\n    const t0 = this.zoomTransform || d3.zoomIdentity;\n    this._k = t0.k;\n    svg.call(this.zoom.transform, t0);\n  }\n\n  refreshMarkers() {\n    const sel = this.state.selected, mk = this.mk(), k = this._k || 1;\n    if (!this.markerSel) return;\n    this.markerSel\n      .attr('r', d => (d._i === sel ? mk + 3.5 : mk) / k)\n      .attr('fill', d => d._i === sel ? '#111110' : this.colorFor(d))\n      .attr('stroke', d => d._i === sel ? this.colorFor(d) : '#fff')\n      .attr('stroke-width', d => (d._i === sel ? 3.5 : 1.5) / k);\n  }\n\n  zoomBy(factor) {\n    if (!this.svgSel || !this.zoom) return;\n    this.svgSel.transition().duration(220).call(this.zoom.scaleBy, factor);\n    this._ensureZoom(() => this.svgSel.call(this.zoom.scaleBy, factor));\n  }\n  zoomReset() {\n    if (!this.svgSel || !this.zoom) return;\n    this.svgSel.transition().duration(380).call(this.zoom.transform, window.d3.zoomIdentity);\n    this._ensureZoom(() => this.svgSel.call(this.zoom.transform, window.d3.zoomIdentity));\n  }\n  // d3 transitions are skipped in some headless/embedded contexts — apply directly if the transition didn't take\n  _ensureZoom(applyFn) {\n    const before = this._k || 1;\n    setTimeout(() => { if (Math.abs((this._k || 1) - before) < 1e-6) applyFn(); }, 60);\n  }\n\n  updatePopup() {\n    const i = this.state.selected;\n    if (i == null || !this.projection) return;\n    const loc = this.byIndex[i];\n    const p = this.projection([loc.lng, loc.lat]);\n    const el = this.mapRef.current;\n    if (!p || !el) return;\n    const tx = this.zoomTransform || window.d3.zoomIdentity;\n    const px = tx.applyX(p[0]), py = tx.applyY(p[1]);\n    const w = el.clientWidth, h = el.clientHeight, cw = 316, ch = 280;\n    let left = px + 16;\n    if (left + cw > w - 12) left = px - cw - 16;\n    left = Math.max(12, Math.min(w - cw - 12, left));\n    let top = py - 70;\n    top = Math.max(12, Math.min(h - ch - 12, top));\n    this.setState({ popupLeft: left + 'px', popupTop: top + 'px' });\n  }\n\n  selectLoc(i) {\n    this.setState({ selected: i }, () => { this.refreshMarkers(); this.updatePopup(); });\n  }\n\n  close() { this.setState({ selected: null }, () => this.refreshMarkers()); }\n\n  filtered() {\n    const q = (this.state.query || '').toLowerCase().trim();\n    let arr = this.state.locations || [];\n    if (q) arr = arr.filter(d => (d.city + ' ' + d.state + ' ' + d.lead).toLowerCase().includes(q));\n    const sel = this.state.selected;\n    return arr.map(d => {\n      const c = this.colorFor(d);\n      return {\n        ...d,\n        active: d._i === sel,\n        bg: d._i === sel ? '#fff' : 'transparent',\n        bar: d._i === sel ? c : 'transparent',\n        dot: c,\n        dotHalo: d._i === sel ? this.hexToHalo(c) : 'transparent',\n        onClick: () => this.selectLoc(d._i)\n      };\n    });\n  }\n\n  renderVals() {\n    const sel = this.state.selected;\n    const locs = this.state.locations || [];\n    const lpcCount = locs.filter(d => this.isLPC(d)).length;\n    const selObj = sel != null ? this.byIndex[sel] : null;\n    const selected = selObj ? {\n      ...selObj,\n      leadLabel: this.isLPC(selObj) ? 'the Listening Post Collective' : selObj.lead,\n      funded: !this.isLPC(selObj)\n    } : {};\n    return {\n      mapRef: this.mapRef,\n      list: this.filtered(),\n      count: locs.length,\n      lpcCount: lpcCount,\n      partnerCount: locs.length - lpcCount,\n      lpcColor: this.lpcColor(),\n      partnerColor: this.partnerColor(),\n      metricVal: String(this.state.metric),\n      shadingOn: this.state.metric >= 0,\n      metricName: this.state.metric >= 0 ? this.METRICS[this.state.metric] : '',\n      legendGradient: 'linear-gradient(90deg,' + this.ramp(this.state.metric).join(',') + ')',\n      onMetric: (e) => this.setMetric(parseInt(e.target.value, 10)),\n      onZoomIn: () => this.zoomBy(1.6),\n      onZoomOut: () => this.zoomBy(1 / 1.6),\n      onZoomReset: () => this.zoomReset(),\n      selected: selected,\n      hasSelected: sel != null,\n      accent: selObj ? this.colorFor(selObj) : this.lpcColor(),\n      popupLeft: this.state.popupLeft,\n      popupTop: this.state.popupTop,\n      showDirectory: this.props.showDirectory ?? true,\n      query: this.state.query,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      onClose: () => this.close()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"build-embed.dc"}
  </script>
